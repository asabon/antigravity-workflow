# AI Agent 自動実行許可設定 (SafeToAutoRun: true)
#
# このファイルは AI エージェントがユーザーの明示的な許可なしに実行できるコマンドのホワイトリストです。
# 他のルール（.antigravityrule, .agent/rules/01_workflow.md 等）に基づき、
# 副作用が限定的、または読み取り専用の操作を中心に定義されています。

general:
  description: "システム情報の取得・基本的なファイル操作"
  commands:
    - ls
    - dir
    - pwd
    - cat
    - type
    - echo
    - fd
    - rg
    - grep

git:
  description: "Git 読み取り操作および 02_git.md の規定に基づく自律的操作"
  commands:
    - git status
    - git status --porcelain
    - git branch
    - git branch -a
    - git branch --show-current
    - git log
    - git diff
    - git show
    - git rev-parse
    - git fetch
    - git remote
    - git submodule
    - git add
    - git checkout

github_cli:
  description: "GitHub CLI を用いた進捗確認・情報取得・一時ファイルを利用した更新（SafeToAutoRun: true）"
  commands:
    - gh auth status
    - gh issue list
    - gh issue view
    - gh pr list
    - gh pr view
    - gh repo view
    - gh issue create --body-file temp/*
    - gh issue create --body-file temp\*
    - gh issue edit --body-file temp/*
    - gh issue edit --body-file temp\*
    - gh pr create --body-file temp/*
    - gh pr create --body-file temp\*
    - gh pr edit --body-file temp/*
    - gh pr edit --body-file temp\*

development_stacks:
  android:
    description: "Android (Gradle) 関連のビルド・検証・テスト"
    commands:
      - ./gradlew assembleDebug
      - ./gradlew testDebugUnitTest
      - ./gradlew ktlintCheck
      - ./gradlew ktlintFormat
      - ./gradlew lintDebug
  
  nodejs_typescript:
    description: "Node.js / TypeScript 関連の依存関係インストール・検証"
    commands:
      - npm install
      - npm test
      - npm run lint
      - npm run build
      - yarn install
      - yarn test
      - yarn lint

  python:
    description: "Python 関連の検証・テスト・フォーマット"
    commands:
      - pip install -r requirements.txt
      - pip list
      - pytest
      - python -m pytest
      - black .
      - flake8
      - isort .

temp_directory:
  description: "temp/ ディレクトリ内の一時ファイル操作 (SafeToAutoRun: true)"
  commands:
    - rm temp/*
    - rm temp\*
    - del temp\*
    - mv temp\*
    - cp temp\*

# 注意: Antigravity 組み込みツール (grep_search, find_by_name 等) は、
# プロトコルレベルで制御されるため、ここでのシェルコマンド定義とは別途扱われます。
